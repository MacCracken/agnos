name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        #
        # Smoke-test at the tail: if the install silently produces no
        # `cyrius` binary (network blip, release not yet propagated,
        # 404, half-written tarball), fail THIS step with a clear
        # error. Without this guard, downstream steps run with
        # `cyrius` missing from PATH — most visibly the Format check,
        # whose `if ! cyrius fmt "$f" --check` reports every kernel
        # file as `NEEDS FORMAT` because each `cyrius` call is in
        # fact `command not found`. (One real occurrence 2026-05-12
        # right after the 5.11.29 cut; all 48 files flagged.)
        run: |
          set -e
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV
          "$HOME/.cyrius/bin/cyrius" --version || {
            echo "FAIL: cyrius toolchain install did not produce a working binary"
            echo "  expected version: $CYRIUS_VERSION"
            echo "  installed contents:"
            ls -la "$HOME/.cyrius/bin/" 2>/dev/null || echo "  (no $HOME/.cyrius/bin/ — install never ran)"
            exit 1
          }

      - name: Build x86_64 kernel
        run: |
          sh scripts/build.sh
          echo "agnos: $(wc -c < build/agnos) bytes"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: build/agnos
          retention-days: 5

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        #
        # Smoke-test at the tail: if the install silently produces no
        # `cyrius` binary (network blip, release not yet propagated,
        # 404, half-written tarball), fail THIS step with a clear
        # error. Without this guard, downstream steps run with
        # `cyrius` missing from PATH — most visibly the Format check,
        # whose `if ! cyrius fmt "$f" --check` reports every kernel
        # file as `NEEDS FORMAT` because each `cyrius` call is in
        # fact `command not found`. (One real occurrence 2026-05-12
        # right after the 5.11.29 cut; all 48 files flagged.)
        run: |
          set -e
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV
          "$HOME/.cyrius/bin/cyrius" --version || {
            echo "FAIL: cyrius toolchain install did not produce a working binary"
            echo "  expected version: $CYRIUS_VERSION"
            echo "  installed contents:"
            ls -la "$HOME/.cyrius/bin/" 2>/dev/null || echo "  (no $HOME/.cyrius/bin/ — install never ran)"
            exit 1
          }

      - name: Format check
        # Files with `#ifdef` inside function bodies can't satisfy both
        # the formatter (wants indentation) and the preprocessor
        # (needs column 0). Skip those with the SKIP list.
        #
        # cyrius 5.10+ changed `cyrius fmt --check` from "print formatted
        # output to stdout" (5.7.x) to "silent, signal via exit code"
        # (0 = already formatted, non-zero = needs format). The diff-based
        # check we used through v1.26.1 always failed under the new
        # toolchain because stdout is empty. Use the exit code directly.
        run: |
          FAIL=0
          SKIP="kernel/user/shell.cyr"
          for f in $(find kernel -name '*.cyr'); do
            [ -f "$f" ] || continue
            echo "$SKIP" | grep -q "$(basename $f)" && continue
            if ! cyrius fmt "$f" --check >/dev/null 2>&1; then
              echo "  NEEDS FORMAT: $f"
              FAIL=1
            fi
          done
          test $FAIL -eq 0 && echo "PASS: all files formatted"

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        run: |
          WARN=0
          # Kernel should not call Linux syscalls
          if grep -rn 'syscall(' kernel/ 2>/dev/null | grep -v '# ' | grep -v 'ksyscall'; then
            echo "WARN: raw Linux syscall in kernel code"
            WARN=1
          fi
          # Check for unbounded loops without guards
          if grep -rn 'while (1)' kernel/ 2>/dev/null | grep -v '# '; then
            echo "WARN: infinite loop without break condition"
            WARN=1
          fi
          # Verify no hardcoded memory addresses outside arch/
          if grep -rn '0xFEE0\|0xB8000\|0x3F8' kernel/core/ 2>/dev/null | grep -v '# '; then
            echo "INFO: hardcoded MMIO addresses in core/ (should be in arch/)"
          fi
          echo "security scan complete (warnings: $WARN)"

  # ── Tests ──
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        #
        # Smoke-test at the tail: if the install silently produces no
        # `cyrius` binary (network blip, release not yet propagated,
        # 404, half-written tarball), fail THIS step with a clear
        # error. Without this guard, downstream steps run with
        # `cyrius` missing from PATH — most visibly the Format check,
        # whose `if ! cyrius fmt "$f" --check` reports every kernel
        # file as `NEEDS FORMAT` because each `cyrius` call is in
        # fact `command not found`. (One real occurrence 2026-05-12
        # right after the 5.11.29 cut; all 48 files flagged.)
        run: |
          set -e
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV
          "$HOME/.cyrius/bin/cyrius" --version || {
            echo "FAIL: cyrius toolchain install did not produce a working binary"
            echo "  expected version: $CYRIUS_VERSION"
            echo "  installed contents:"
            ls -la "$HOME/.cyrius/bin/" 2>/dev/null || echo "  (no $HOME/.cyrius/bin/ — install never ran)"
            exit 1
          }

      - name: Run test suite
        run: sh scripts/test.sh

  # ── Boot Test ──
  boot-test:
    name: QEMU Boot Test
    runs-on: [self-hosted, linux, x64]
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf $HOME/.cyrius
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        #
        # Smoke-test at the tail: if the install silently produces no
        # `cyrius` binary (network blip, release not yet propagated,
        # 404, half-written tarball), fail THIS step with a clear
        # error. Without this guard, downstream steps run with
        # `cyrius` missing from PATH — most visibly the Format check,
        # whose `if ! cyrius fmt "$f" --check` reports every kernel
        # file as `NEEDS FORMAT` because each `cyrius` call is in
        # fact `command not found`. (One real occurrence 2026-05-12
        # right after the 5.11.29 cut; all 48 files flagged.)
        run: |
          set -e
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV
          "$HOME/.cyrius/bin/cyrius" --version || {
            echo "FAIL: cyrius toolchain install did not produce a working binary"
            echo "  expected version: $CYRIUS_VERSION"
            echo "  installed contents:"
            ls -la "$HOME/.cyrius/bin/" 2>/dev/null || echo "  (no $HOME/.cyrius/bin/ — install never ran)"
            exit 1
          }

      - name: Build kernel
        run: sh scripts/build.sh

      - name: Build ISO (if grub available)
        run: |
          if command -v grub-mkrescue >/dev/null 2>&1; then
            sh scripts/iso.sh
          else
            echo "grub-mkrescue not available, skipping ISO"
          fi
        continue-on-error: true

      - name: Install boot toolchain (OVMF + disk-image tools)
        # gnoboot+OVMF replaces the pre-1.30.0 `-kernel` boot path
        # (which can't load our ELF64 multiboot2 kernel without a PVH
        # ELF note — see 1.30.0 CHANGELOG and Path A→C transition).
        # parted + mtools build the GPT-disk-with-ESP layout OVMF
        # requires for `\EFI\BOOT\BOOTX64.EFI` removable-boot resolution.
        run: |
          set -e
          if ! command -v ovmf-vars >/dev/null 2>&1 && \
             [ ! -f /usr/share/edk2-ovmf/x64/OVMF_CODE.4m.fd ] && \
             [ ! -f /usr/share/OVMF/OVMF_CODE.fd ]; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              ovmf parted mtools qemu-system-x86
          fi

      - name: Download gnoboot release asset
        # gnoboot v0.1.0 is the AGNOS sovereign UEFI bootloader. Pinned
        # here as the kernel's CI-side test bootloader; bump when gnoboot
        # ships a new release (or just update GNOBOOT_VERSION below).
        # No cyrius-build dependency in agnos CI for gnoboot — the
        # release tarball is a pre-built BOOTX64.EFI.
        run: |
          set -e
          # gnoboot tags as plain semver (e.g. "0.1.0"), no `v` prefix.
          # The release.yml tag-filter accepts both but the actual tags
          # are plain — match exactly what's on GitHub.
          GNOBOOT_VERSION="0.1.0"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/gnoboot/releases/download/${GNOBOOT_VERSION}/BOOTX64.EFI" \
            -o build/BOOTX64.EFI
          echo "gnoboot BOOTX64.EFI: $(wc -c < build/BOOTX64.EFI) bytes"
          file build/BOOTX64.EFI

      - name: Boot test — gnoboot → AGNOS kernel under QEMU+OVMF
        # 1.30.0 boot-path migration. Pre-1.30.0 ran `qemu -kernel` on
        # the ELF32 multiboot1 kernel; post-1.30.0 the kernel is ELF64
        # sovereign-struct-entry and only gnoboot can deliver it.
        #
        # Assertion set is currently RELAXED — banner + KASLR randomization
        # only. The deeper assertions (`Memory isolation: PASS`,
        # `Userland exec complete`) require the scheduler/test_procs to
        # complete a 50-tick loop; that path breaks under UEFI+gnoboot
        # (vs. the legacy `-kernel` path), tracked in
        # `docs/development/state.md` § *Open investigation*. The fix is
        # its own agnos sub-arc (proposed 1.30.x). Once that ships, this
        # CI step will tighten back to the full pre-1.30.0 assertion set.
        #
        # `-cpu max` advertises RDRAND + SMEP + SMAP. The kernel's
        # kaslr_seed() / boot shim depend on these; default qemu64 lacks
        # them. Real iron (NUC AMD / Zen) supports them natively.
        run: |
          set -e

          # Locate OVMF firmware files (Arch vs Ubuntu paths differ).
          OVMF_CODE=""
          OVMF_VARS_SRC=""
          for c in /usr/share/edk2-ovmf/x64/OVMF_CODE.4m.fd \
                   /usr/share/OVMF/OVMF_CODE.fd; do
            [ -f "$c" ] && OVMF_CODE="$c" && break
          done
          for v in /usr/share/edk2-ovmf/x64/OVMF_VARS.4m.fd \
                   /usr/share/OVMF/OVMF_VARS.fd; do
            [ -f "$v" ] && OVMF_VARS_SRC="$v" && break
          done
          [ -n "$OVMF_CODE" ]     || { echo "FAIL: OVMF_CODE.fd not found"; exit 1; }
          [ -n "$OVMF_VARS_SRC" ] || { echo "FAIL: OVMF_VARS.fd not found"; exit 1; }
          echo "OVMF_CODE: $OVMF_CODE"
          echo "OVMF_VARS: $OVMF_VARS_SRC"

          # Build the GPT-disk-with-ESP image and run two boots back-to-back
          # for the KASLR two-boot-diff assertion.
          boot_once() {
            local LOG="$1"
            local DISK="$(mktemp --tmpdir agnos-bt-XXXXXX.img)"
            dd if=/dev/zero of="$DISK" bs=1M count=64 status=none
            parted -s "$DISK" mklabel gpt mkpart ESP fat32 1MiB 100% set 1 esp on >/dev/null 2>&1
            mformat -i "$DISK"@@1048576 -F
            mmd -i "$DISK"@@1048576 ::EFI ::EFI/BOOT ::boot
            mcopy -i "$DISK"@@1048576 build/BOOTX64.EFI ::EFI/BOOT/BOOTX64.EFI
            mcopy -i "$DISK"@@1048576 build/agnos      ::boot/agnos
            local VARS="$(mktemp --tmpdir agnos-bt-vars-XXXXXX.fd)"
            cp "$OVMF_VARS_SRC" "$VARS"
            chmod +w "$VARS"
            timeout 30 qemu-system-x86_64 \
              -machine q35 -m 256M -cpu max \
              -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
              -drive if=pflash,format=raw,file="$VARS" \
              -drive file="$DISK",format=raw \
              -serial stdio -display none -no-reboot 2>&1 | tee "$LOG" || true
            rm -f "$DISK" "$VARS"
          }

          mkdir -p build
          boot_once build/boot_output.log
          boot_once build/boot_output_2.log

          # Serial includes UART init bytes that grep classifies as binary;
          # -a forces text mode so the assertions actually fire.
          grep -aq "AGNOS kernel v" build/boot_output.log || {
            echo "FAIL: kernel did not print boot banner under gnoboot+OVMF"
            tail -40 build/boot_output.log
            exit 1; }

          # KASLR two-boot-diff: pmm_next_free must vary across boots.
          # (Same assertion as pre-1.30.0, just now sourced from
          # gnoboot+OVMF boot output instead of `-kernel`.)
          KASLR_1=$(grep -aoE "KASLR: pmm_next_free=[0-9-]+" build/boot_output.log | head -1)
          KASLR_2=$(grep -aoE "KASLR: pmm_next_free=[0-9-]+" build/boot_output_2.log | head -1)
          [ -n "$KASLR_1" ] || { echo "FAIL: no KASLR probe in first boot"; exit 1; }
          [ -n "$KASLR_2" ] || { echo "FAIL: no KASLR probe in second boot"; exit 1; }
          if [ "$KASLR_1" = "$KASLR_2" ]; then
            echo "FAIL: KASLR randomization not firing — two boots produced identical pmm_next_free ($KASLR_1)"
            exit 1
          fi

          # Scheduler-activation reached: post-1.30.0 the scheduler-test +
          # memory-isolation + userland-exec checkpoints break under
          # gnoboot+OVMF (kernel-side bug, see state.md). Activating
          # scheduler is the last known-passing checkpoint and a good
          # gate for "the boot path delivered us all the way through
          # post-EBS init".
          grep -aq "Activating scheduler" build/boot_output.log || {
            echo "FAIL: kernel did not reach Activating scheduler checkpoint"
            echo "--- last 40 lines of serial ---"
            tail -40 build/boot_output.log
            exit 1; }

          echo "PASS: kernel boots through Activating scheduler under gnoboot+OVMF"
          echo "PASS: KASLR varies across boots ($KASLR_1 vs $KASLR_2)"

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    runs-on: [self-hosted, linux, x64]
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf $HOME/.cyrius
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        #
        # Smoke-test at the tail: if the install silently produces no
        # `cyrius` binary (network blip, release not yet propagated,
        # 404, half-written tarball), fail THIS step with a clear
        # error. Without this guard, downstream steps run with
        # `cyrius` missing from PATH — most visibly the Format check,
        # whose `if ! cyrius fmt "$f" --check` reports every kernel
        # file as `NEEDS FORMAT` because each `cyrius` call is in
        # fact `command not found`. (One real occurrence 2026-05-12
        # right after the 5.11.29 cut; all 48 files flagged.)
        run: |
          set -e
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV
          "$HOME/.cyrius/bin/cyrius" --version || {
            echo "FAIL: cyrius toolchain install did not produce a working binary"
            echo "  expected version: $CYRIUS_VERSION"
            echo "  installed contents:"
            ls -la "$HOME/.cyrius/bin/" 2>/dev/null || echo "  (no $HOME/.cyrius/bin/ — install never ran)"
            exit 1
          }

      - name: Run benchmarks
        run: sh scripts/bench.sh
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmarks
          path: |
            BENCHMARKS.md
            bench-history.csv
          retention-days: 90

  # ── Documentation ──
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE CLAUDE.md; do
            if [ -f "$doc" ]; then
              echo "  OK: $doc"
            else
              echo "  MISSING: $doc"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Verify version consistency
        # cyrius.cyml resolves its version from VERSION via `${file:VERSION}`,
        # so the only authoritative version is the VERSION file. Assert the
        # kernel source + CHANGELOG carry the same string.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "version = \"\${file:VERSION}\"" cyrius.cyml || {
            echo "FAIL: cyrius.cyml does not resolve version from VERSION file"; exit 1; }
          grep -q "$VERSION" kernel/agnos.cyr || {
            echo "FAIL: version not in kernel source"; exit 1; }
          grep -q "$VERSION" CHANGELOG.md || {
            echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent: $VERSION"
