name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        run: |
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Build x86_64 kernel
        run: |
          sh scripts/build.sh
          echo "agnos: $(wc -c < build/agnos) bytes"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: build/agnos
          retention-days: 5

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        run: |
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Format check
        # Files with `#ifdef` inside function bodies can't satisfy both
        # the formatter (wants indentation) and the preprocessor
        # (needs column 0). Skip those with the SKIP list.
        #
        # cyrius 5.10+ changed `cyrius fmt --check` from "print formatted
        # output to stdout" (5.7.x) to "silent, signal via exit code"
        # (0 = already formatted, non-zero = needs format). The diff-based
        # check we used through v1.26.1 always failed under the new
        # toolchain because stdout is empty. Use the exit code directly.
        run: |
          FAIL=0
          SKIP="kernel/user/shell.cyr"
          for f in $(find kernel -name '*.cyr'); do
            [ -f "$f" ] || continue
            echo "$SKIP" | grep -q "$(basename $f)" && continue
            if ! cyrius fmt "$f" --check >/dev/null 2>&1; then
              echo "  NEEDS FORMAT: $f"
              FAIL=1
            fi
          done
          test $FAIL -eq 0 && echo "PASS: all files formatted"

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        run: |
          WARN=0
          # Kernel should not call Linux syscalls
          if grep -rn 'syscall(' kernel/ 2>/dev/null | grep -v '# ' | grep -v 'ksyscall'; then
            echo "WARN: raw Linux syscall in kernel code"
            WARN=1
          fi
          # Check for unbounded loops without guards
          if grep -rn 'while (1)' kernel/ 2>/dev/null | grep -v '# '; then
            echo "WARN: infinite loop without break condition"
            WARN=1
          fi
          # Verify no hardcoded memory addresses outside arch/
          if grep -rn '0xFEE0\|0xB8000\|0x3F8' kernel/core/ 2>/dev/null | grep -v '# '; then
            echo "INFO: hardcoded MMIO addresses in core/ (should be in arch/)"
          fi
          echo "security scan complete (warnings: $WARN)"

  # ── Tests ──
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        run: |
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Run test suite
        run: sh scripts/test.sh

  # ── Boot Test ──
  boot-test:
    name: QEMU Boot Test
    runs-on: [self-hosted, linux, x64]
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf $HOME/.cyrius
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        run: |
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Build kernel
        run: sh scripts/build.sh

      - name: Build ISO (if grub available)
        run: |
          if command -v grub-mkrescue >/dev/null 2>&1; then
            sh scripts/iso.sh
          else
            echo "grub-mkrescue not available, skipping ISO"
          fi
        continue-on-error: true

      - name: QEMU boot test
        # v1.24.0: drop `continue-on-error: true` (was masking the
        # 1.23.0 boot regression that cyrius v5.7.19 kmode-emit fix
        # resolved). `-cpu max` is required because the boot shim's
        # CR4 OR-mask (0x300020) sets SMEP+SMAP, which the default
        # qemu64 CPU lacks. Real silicon since Haswell/Ryzen supports
        # both. See proposals/archive/2026-04-27-cc5-kernel-boot-shim-regression.md.
        #
        # v1.25.0: assertion tightened from `"AGNOS"` (line 1, useless)
        # to `"Scheduler test done"` (post-ACPI/PCI/IOMMU/scheduler).
        # See proposals/archive/2026-04-27-acpi-identity-map-ceiling.md.
        #
        # v1.25.1: tightened further to `"Userland exec complete"` —
        # past the memory-isolation test (now gated) and through
        # `spawn_user_proc()`. Catches any future regression in the
        # per-process page-table machinery (proc.cyr) or the userland
        # ELF/ring3 path. Memory-isolation test stays gated behind
        # `-D MEMORY_ISOLATION_TEST` until the cr3-dance fault is
        # diagnosed (Active item #5 in the roadmap).
        run: |
          set -e
          timeout 12 qemu-system-x86_64 \
            -kernel build/agnos \
            -cpu max \
            -serial stdio \
            -display none \
            -no-reboot 2>&1 | tee build/boot_output.log || true
          # Serial log includes UART init bytes that grep classifies as
          # binary; -a forces text mode so the assertions actually fire.
          grep -aq "AGNOS kernel v" build/boot_output.log || {
            echo "FAIL: kernel did not print boot banner"; exit 1; }
          grep -aq "Userland exec complete" build/boot_output.log || {
            echo "FAIL: kernel did not reach Userland exec complete checkpoint"
            echo "--- last 20 lines of serial ---"
            tail -20 build/boot_output.log
            exit 1; }
          echo "PASS: kernel boots through Userland exec complete"

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    runs-on: [self-hosted, linux, x64]
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf $HOME/.cyrius
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        # Use cyrius's canonical installer (published as a release asset
        # alongside each tarball). Reads CYRIUS_VERSION from cyrius.cyml.
        run: |
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Run benchmarks
        run: sh scripts/bench.sh
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmarks
          path: |
            BENCHMARKS.md
            bench-history.csv
          retention-days: 90

  # ── Documentation ──
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE CLAUDE.md; do
            if [ -f "$doc" ]; then
              echo "  OK: $doc"
            else
              echo "  MISSING: $doc"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Verify version consistency
        # cyrius.cyml resolves its version from VERSION via `${file:VERSION}`,
        # so the only authoritative version is the VERSION file. Assert the
        # kernel source + CHANGELOG carry the same string.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "version = \"\${file:VERSION}\"" cyrius.cyml || {
            echo "FAIL: cyrius.cyml does not resolve version from VERSION file"; exit 1; }
          grep -q "$VERSION" kernel/agnos.cyr || {
            echo "FAIL: version not in kernel source"; exit 1; }
          grep -q "$VERSION" CHANGELOG.md || {
            echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent: $VERSION"
