name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "1.9.0"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          sh scripts/ci-cyrius.sh $CYRIUS_VERSION
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Test x86_64
        run: sh scripts/test.sh

      - name: Verify VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Version: $VERSION"
          test -n "$VERSION"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE; do
            test -f "$doc" && echo "  OK: $doc" || { echo "  MISSING: $doc"; exit 1; }
          done

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          grep -q "$VERSION" kernel/agnos.cyr || { echo "FAIL: version not in kernel"; exit 1; }
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }

  boot-test:
    runs-on: [self-hosted, linux, x64]
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf ../cyrius ~/.cyrius/bin
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        run: |
          sh scripts/ci-cyrius.sh $CYRIUS_VERSION
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Build kernel
        run: sh scripts/build.sh

      - name: QEMU boot test
        run: |
          timeout 10 qemu-system-x86_64 \
            -kernel build/agnos \
            -serial stdio \
            -display none \
            -no-reboot 2>&1 | tee /tmp/boot_output
          grep -q "AGNOS" /tmp/boot_output && echo "PASS: kernel boots"
        continue-on-error: true

  benchmarks:
    runs-on: [self-hosted, linux, x64]
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf ../cyrius ~/.cyrius/bin
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        run: |
          sh scripts/ci-cyrius.sh $CYRIUS_VERSION
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Run benchmarks
        run: sh scripts/bench.sh
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmarks
          path: |
            BENCHMARKS.md
            bench-history.csv
          retention-days: 90
