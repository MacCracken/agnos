name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "1.9.0"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          sh scripts/ci-cyrius.sh $CYRIUS_VERSION
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Test x86_64
        run: sh scripts/test.sh

      - name: Verify VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Version: $VERSION"
          test -n "$VERSION"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE; do
            test -f "$doc" && echo "  OK: $doc" || { echo "  MISSING: $doc"; exit 1; }
          done

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          grep -q "$VERSION" kernel/agnos.cyr || { echo "FAIL: version not in kernel"; exit 1; }
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }

  boot-test:
    runs-on: [self-hosted, linux, x64]
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf ../cyrius ~/.cyrius/bin
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        run: |
          sh scripts/ci-cyrius.sh $CYRIUS_VERSION
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Debug toolchain
        run: |
          echo "cyrb: $(file $HOME/.cyrius/bin/cyrb)"
          echo "cc2: $(file $HOME/.cyrius/bin/cc2)"
          echo "cyrb size: $(wc -c < $HOME/.cyrius/bin/cyrb)"
          echo "cc2 size: $(wc -c < $HOME/.cyrius/bin/cc2)"
          $HOME/.cyrius/bin/cyrb --help | head -1
          echo "=== Direct cc2 test ==="
          echo 'kernel; var x = 42; asm { cli; hlt; 0xEB; 0xFE; }' | $HOME/.cyrius/bin/cc2 > /tmp/cc2_test && echo "cc2 direct: OK ($(wc -c < /tmp/cc2_test) bytes)" || echo "cc2 direct: FAIL"
          echo "=== cyrb -D test ==="
          echo 'kernel; #ifdef T var x = 1; #endif asm { cli; hlt; 0xEB; 0xFE; }' > /tmp/dtest.cyr
          (cd kernel && mkdir -p build && cp $HOME/.cyrius/bin/cc2 build/cc2 && $HOME/.cyrius/bin/cyrb build -D T /tmp/dtest.cyr /tmp/dtest_out 2>&1) && echo "cyrb -D: OK ($(wc -c < /tmp/dtest_out) bytes)" || echo "cyrb -D: FAIL"

      - name: Build kernel
        run: sh scripts/build.sh

      - name: Build ISO (if grub available)
        run: |
          if command -v grub-mkrescue >/dev/null 2>&1; then
            sh scripts/iso.sh
          else
            echo "grub-mkrescue not available, skipping ISO"
          fi
        continue-on-error: true

      - name: QEMU boot test
        run: |
          timeout 10 qemu-system-x86_64 \
            -kernel build/agnos \
            -serial stdio \
            -display none \
            -no-reboot 2>&1 | tee /tmp/boot_output
          grep -q "AGNOS" /tmp/boot_output && echo "PASS: kernel boots"
        continue-on-error: true

  benchmarks:
    runs-on: [self-hosted, linux, x64]
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale state
        run: |
          rm -rf ../cyrius ~/.cyrius/bin
          rm -rf build kernel/build

      - name: Install Cyrius toolchain
        run: |
          sh scripts/ci-cyrius.sh $CYRIUS_VERSION
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Run benchmarks
        run: sh scripts/bench.sh
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmarks
          path: |
            BENCHMARKS.md
            bench-history.csv
          retention-days: 90
