name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step normalizes to `1.2.3` and matches against VERSION.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── CI Gate (must pass before release) ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build release binaries ──
  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v'
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        run: |
          export CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          curl -fsSL --retry 5 --retry-all-errors \
            "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/install.sh" | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Build x86_64 kernel
        run: |
          sh scripts/build.sh
          cp build/agnos agnos-x86_64
          echo "agnos-x86_64: $(wc -c < agnos-x86_64) bytes"

      - name: Build aarch64 kernel (compile test)
        run: |
          (sh scripts/build.sh --aarch64 2>/dev/null && cp build/agnos-aarch64 agnos-aarch64) || echo "aarch64 not yet portable"

      - name: Run tests
        run: sh scripts/test.sh

      - name: Extract changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \\[$TAG\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="No changelog entry for this release."
          fi
          echo "$BODY" > release-body.md

      - name: Create source archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="agnos-${TAG}/" -o "agnos-${TAG}-src.tar.gz" HEAD

      - name: Generate checksums
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sha256sum agnos-x86_64 > SHA256SUMS
          if [ -f agnos-aarch64 ]; then sha256sum agnos-aarch64 >> SHA256SUMS; fi
          sha256sum "agnos-${TAG}-src.tar.gz" >> SHA256SUMS
          cat SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            agnos-x86_64
            agnos-aarch64
            agnos-*-src.tar.gz
            SHA256SUMS
            release-body.md
          retention-days: 5

  # ── Create GitHub Release ──
  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries

      - name: Resolve clean tag (strip optional 'v')
        id: tag
        run: echo "clean=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "AGNOS ${{ steps.tag.outputs.clean }}"
          body_path: release-body.md
          prerelease: ${{ startsWith(steps.tag.outputs.clean, '0.') }}
          files: |
            agnos-x86_64
            agnos-aarch64
            agnos-${{ steps.tag.outputs.clean }}-src.tar.gz
            SHA256SUMS
