name: Release

on:
  push:
    tags: ['*']

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    env:
      CYRIUS_VERSION: "1.8.5"
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Install Cyrius toolchain
        run: |
          curl -sSf "https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/ci.sh" | sh -s $CYRIUS_VERSION
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Build x86_64 kernel
        run: |
          sh scripts/build.sh
          cp build/agnos agnos-x86_64

      - name: Build aarch64 kernel (compile test)
        run: |
          (sh scripts/build.sh --aarch64 2>/dev/null && cp build/agnos-aarch64 agnos-aarch64) || echo "aarch64 not yet portable"

      - name: Generate checksums
        run: |
          sha256sum agnos-x86_64 > SHA256SUMS
          if [ -f agnos-aarch64 ]; then sha256sum agnos-aarch64 >> SHA256SUMS; fi
          cat SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            agnos-x86_64
            agnos-aarch64
            SHA256SUMS
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            agnos-x86_64
            agnos-aarch64
            SHA256SUMS
